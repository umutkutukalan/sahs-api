spring.application.name=sahnesen
# Hibernate'in tabloları otomatik uçurup kaçırmasını engelliyoruz
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway'i aktif ediyoruz
spring.flyway.enabled=true
# Eğer veritabanın şu an tamamen boş değilse ve içinde tablolar varsa bunu ekle:
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.ignore-migration-limit-check=true


# Yükleme dizini (örn: profil resimleri, içerik görselleri vb.)
file.upload-dir=./uploads

spring.cache.type=redis

spring.main.allow-circular-references=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}

spring.security.oauth2.client.registration.google.scope=openid,profile,email

jwt.secret=${JWT_SECRET}

# Tek bir dosya için maksimum boyut
spring.servlet.multipart.max-file-size=5MB
# Toplam istek (request) için maksimum boyut
spring.servlet.multipart.max-request-size=5MB